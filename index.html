<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Status Xerox</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    .device-summary {
      font-size: 24px;
      color: green;
    }
    .timer {
      margin-top: 20px;
      font-size: 18px;
      color: #333;
    }
  </style>
</head>
<body>

<h1>Status urządzenia</h1>

<div id="container"></div>
<div id="timer" class="timer"></div>

<script>
  const container = document.getElementById('container');
  const timerEl = document.getElementById('timer');

  const STORAGE_KEY = 'deviceStatusState';

  function randomInterval(minSeconds, maxSeconds) {
    const minMs = minSeconds * 1000;
    const maxMs = maxSeconds * 1000;
    return Math.floor(Math.random() * (maxMs - minMs + 1)) + minMs;
  }

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${m}:${s.toString().padStart(2, '0')}`;
  }

  function saveState(visible, nextChangeTime) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      visible,
      nextChangeTime
    }));
  }

  function loadState() {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : null;
  }

  function render(visible) {
    container.innerHTML = '';
    if (visible) {
      const div = document.createElement('div');
      div.className = 'device-summary';
      div.textContent = 'Device Summary';
      container.appendChild(div);
    }
  }

  function startCountdown(nextChangeTime) {
    function update() {
      const now = Date.now();
      const diff = Math.max(0, Math.floor((nextChangeTime - now) / 1000));
      timerEl.textContent = `Kolejna zmiana za: ${formatTime(diff)}`;
    }

    update();
    return setInterval(update, 1000);
  }

  function scheduleNext(visible) {
    const nextInterval = randomInterval(30, 420);
    const nextChangeTime = Date.now() + nextInterval;

    saveState(visible, nextChangeTime);

    setTimeout(() => {
      toggleText();
    }, nextInterval);

    return nextChangeTime;
  }

  function toggleText() {
    const state = loadState();
    const newVisible = !(state?.visible ?? false);

    render(newVisible);
    const nextChangeTime = scheduleNext(newVisible);

    if (window.countdownInterval) {
      clearInterval(window.countdownInterval);
    }
    window.countdownInterval = startCountdown(nextChangeTime);
  }

  function init() {
    const state = loadState();

    if (state) {
      const now = Date.now();

      // jeśli czas już minął → wymuś zmianę
      if (state.nextChangeTime <= now) {
        toggleText();
        return;
      }

      // odtwórz stan
      render(state.visible);

      const remaining = state.nextChangeTime - now;

      setTimeout(() => {
        toggleText();
      }, remaining);

      window.countdownInterval = startCountdown(state.nextChangeTime);
    } else {
      toggleText();
    }
  }

  init();
</script>

</body>
</html>
